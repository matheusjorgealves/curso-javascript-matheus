<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha primeira página</title>
    <style>
        body{
            background-color: rgb(0, 0, 0);  /*isso é um comentario dentro da tecnologia CSS*/
            color: rgb(255, 230, 0); 
            font: 20pt arial;        
        }   
        h1{
            color: rgba(80, 240, 6, 0.918);
        }
    </style>
</head>
<body>
    <h1> Olá, mundo! </h1> 
    <p> Meus primeiros passos </p>   <!--isso é um comentario dentro da tecnologia HTML-->
    <script>
        var n1 = Number(window.prompt ('Digite um valor númérico: ')) // String --- o comando PROMPT retorna string
        var n2 = Number(window.prompt ('Digite outro valor númérico: ')) // String --- o comando PROMPT retorna string
        var s = n1 + n2 
        // (number + number) adição
        // (string + string) concatenação
        window.alert(`A soma entre ${n1} e ${n2} é = ${s}`)  // ${} isso é um template string 
    </script>  
</body>
</html>

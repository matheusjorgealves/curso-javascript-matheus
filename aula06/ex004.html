<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio 004 </title>
    <style>
        body{
            font: 20pt arial;
        }
    </style>
</head>
<body>
   
    <script>
        var nome = window.prompt('Qual é o seu nome?: ')
        document.write(`Olá, ${nome}! Seu nome tem ${nome.length} letras <br/>`)
        document.write(`O seu nome em letras maiusculas ${nome.toUpperCase()} <br/>`)
        document.write(`O seu nome em letras minusculas ${nome.toLowerCase()}<br/>`)
    </script>   
</body>
</html>

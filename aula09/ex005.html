<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        body{
            background-color: rgb(0, 0, 95);
            font: normal 15pt arial;
            color: aliceblue;
        }
    </style>
</head>
<body>
    <h1> Iniciando estudos DOM </h1> 
    <p id="paragrafo1"> Aqui vai o resultado </p>
    <p id="paragrafo2"> Aprendendo a usar o <strong> DOM</strong> em JavaScript </p>
    <div id="div1"> Clique em mim </div>
    <script>
        var p1 = window.document.getElementById('paragrafo1')  
        p1.style.background = 'green'
        var p2 = window.document.getElementById('paragrafo2')
        p2.style.background = 'red'
        var div1 = window.document.getElementById('div1')
        div1.style.background = 'purple'
    </script>
</body>
</html>

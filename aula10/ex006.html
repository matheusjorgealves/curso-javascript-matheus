<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Eventos DOM </title>
    <style>
        div#area{
            font: normal 20pt arial;
            background-color: #3939fa;
            color: aliceblue;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>


    <script>

        var area = window.document.getElementById('area')
        area.addEventListener('click' , clicar) // "clicar" recebe o evento CLICK
        area.addEventListener('mouseenter' , entrou) // "entrou" recebe o evento MOUSEENTER
        area.addEventListener('mouseout' , saiu) // "saiu" recebe o eveto MOUSEOUT
        function clicar(){ //"Clicar" é o nome da minha função que carrega o evento CLICK
            area.style.backgroundColor = 'red' 
            area.innerText = 'Clicou'
        }
        function entrou(){ // "Entrou" é o nome da minha função que carrega o evento MOUSEENTER
            area.innerText = 'Entrou'
        }
        function saiu(){ // "saiu" é o nome da minha função que carrega o evento MOUSEOUT
            area.style.backgroundColor = 'blue'
            area.innerText = 'Interaja...'
        }
 
    </script>


</body>
</html>
